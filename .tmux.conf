# Prefix key: Ctrl-A
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# TPM plugin path (required for plugin install outside tmux)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Catppuccin theme
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session} "
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# Session management keybindings
# prefix + S — list all sessions sorted by last attached time
bind S choose-tree -sZ -O time

# Auto-restore last saved session on tmux start
set -g @continuum-restore 'on'

# Save interval in minutes
set -g @continuum-save-interval '1'

# Restore pane contents
set -g @resurrect-capture-pane-contents 'on'

# Restore additional programs (~ prefix appends to defaults)
set -g @resurrect-processes '~ssh ~python3 ~node ~claude'

# Restore vim sessions (requires :mksession or vim-obsession)
set -g @resurrect-strategy-vim 'session'

# Auto-resume claude with latest matching session UUID
# Strategy script: ~/.tmux/plugins/tmux-resurrect/strategies/claude_autoresume.sh
# Source of truth: ~/tmux_continuity/claude_autoresume.sh
# Debug log:       ~/tmux_continuity/claude_autoresume.log
set -g @resurrect-strategy-claude 'autoresume'

# Auto-freeze claude TUIs in non-visible panes to keep tmux server responsive.
# Script: ~/tmux_continuity/tmux_claude_pane_freezer.sh
# Idea: SIGSTOP every claude whose pane is not the active pane of an attached
# session's active window; SIGCONT the visible ones. Run -b (background) so
# tmux's event loop is never blocked by the hook itself.
set-hook -g after-select-pane      'run-shell -b "~/tmux_continuity/tmux_claude_pane_freezer.sh"'
set-hook -g after-select-window    'run-shell -b "~/tmux_continuity/tmux_claude_pane_freezer.sh"'
set-hook -g client-attached        'run-shell -b "~/tmux_continuity/tmux_claude_pane_freezer.sh"'
set-hook -g client-session-changed 'run-shell -b "~/tmux_continuity/tmux_claude_pane_freezer.sh"'
set-hook -g session-window-changed 'run-shell -b "~/tmux_continuity/tmux_claude_pane_freezer.sh"'
# Apply once on tmux config load (catches server start and reload).
run-shell -b "~/tmux_continuity/tmux_claude_pane_freezer.sh"

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
