# TPM plugin path (required for plugin install outside tmux)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Catppuccin theme
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# Auto-restore last saved session on tmux start
set -g @continuum-restore 'on'

# Save interval in minutes
set -g @continuum-save-interval '1'

# Auto-start tmux on boot via systemd
set -g @continuum-boot 'on'

# Restore pane contents
set -g @resurrect-capture-pane-contents 'on'

# Restore additional programs (~ prefix appends to defaults)
set -g @resurrect-processes '~ssh ~python3 ~node'

# Restore vim sessions (requires :mksession or vim-obsession)
set -g @resurrect-strategy-vim 'session'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
