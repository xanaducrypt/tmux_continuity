# Prefix key: Ctrl-A
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# General behavior
# 1-indexed windows and panes — matches the 1-9 keys on the keyboard.
# Note: existing windows keep their 0-based indices; only new windows get 1-based.
set -g base-index 1
setw -g pane-base-index 1
# When a window closes, renumber the remaining windows to close the gap.
set -g renumber-windows on
# Enable 24-bit color (true color) for any outer terminal that supports RGB.
# Catppuccin renders noticeably better; no need to change default-terminal.
set -as terminal-features ",*:RGB"
# Highlight a window's name in the status bar when a background pane has output.
# Pairs with visual-activity off (already off) — quiet, glanceable hint.
setw -g monitor-activity on

# TPM plugin path (required for plugin install outside tmux)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# Hint-based copy: prefix+F highlights URLs/paths/hashes on screen with letter
# hints; type the hint to copy. Binary fetched from GH release (no Crystal toolchain
# needed). Headless: disable system-clipboard since xclip isn't installed —
# fingers copies to the tmux buffer, which OSC52s out via set-clipboard external.
set -g @plugin 'Morantron/tmux-fingers'
set -g @fingers-use-system-clipboard 0

# Catppuccin theme
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session} "
# PFX flashes while waiting for the next key after prefix; SYNC stays lit while
# synchronize-panes is on for the current window. Both go on status-left so they
# sit next to the session name without breaking catppuccin's styled right segments.
set -ag status-left "#{?client_prefix,#[fg=yellow#,bold] PFX #[default],}"
set -ag status-left "#{?pane_synchronized,#[fg=red#,bold] SYNC #[default],}"
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# Session management keybindings
# prefix + S — list all sessions sorted by last attached time
bind S choose-tree -sZ -O time

# Auto-restore last saved session on tmux start
set -g @continuum-restore 'on'

# Save interval in minutes
set -g @continuum-save-interval '1'

# Restore pane contents
set -g @resurrect-capture-pane-contents 'on'

# Restore additional programs (~ prefix means: regex-match anywhere in saved cmd)
set -g @resurrect-processes '~ssh ~python3 ~node ~claude'

# Restore vim sessions (requires :mksession or vim-obsession)
set -g @resurrect-strategy-vim 'session'

# Auto-resume claude with latest matching session UUID
# Strategy script: ~/.tmux/plugins/tmux-resurrect/strategies/claude_autoresume.sh
# Source of truth: ~/tmux_continuity/claude_autoresume.sh
# Debug log:       ~/tmux_continuity/claude_autoresume.log
set -g @resurrect-strategy-claude 'autoresume'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
set -g mouse on
